spring.application.name=ScooterFlow

# ????? ??? ??????? - ???? ????? ????? ??????? data
spring.datasource.url=jdbc:h2:file:./data/scooter-flow-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
